name: auto-merge
on:
  pull_request:
    types: [labeled,opened,reopened]
    branches:
      - 'master'
      - 'release-*'

jobs:
  pr-mgmt:
    uses: kumahq/.github/.github/workflows/wfc_pr_management.yml@f8b89ff1817720691612fa145c5154f94585f344 # main
    with:
      approve: true
      merge: true
      matchLabel: "ci/auto-merge"
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
