name: auto-merge
on:
  pull_request:
    types: [labeled,opened,reopened]
    branches:
      - 'master'
      - 'release-*'

jobs:
  pr-mgmt:
    uses: kumahq/.github/.github/workflows/wfc_pr_management.yml@d266a5173018b554838bc167fedd4a2bd08add64 # main
    with:
      approve: true
      merge: true
      matchLabel: "ci/auto-merge"
    secrets:
      github-token: ${{ secrets.GITHUB_TOKEN }}
